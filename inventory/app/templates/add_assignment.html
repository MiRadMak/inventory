{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-semibold text-primary-100 mb-2">Новое назначение</h1>
        <p class="text-primary-400">Закрепление оборудования за сотрудником</p>
    </div>

    <div class="glass-morph subtle-shadow rounded-2xl p-8 border border-primary-700/30">
        <form method="post" class="space-y-6">
            <div>
                <h3 class="text-lg font-semibold text-primary-100 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"/>
                    </svg>
                    Выбор оборудования
                </h3>
                <div>
                    <label class="block text-sm font-medium text-primary-300 mb-2">Оборудование *</label>
                    <select name="equipment_id" required 
                            class="w-full px-4 py-3 bg-primary-800/30 border border-primary-700/50 rounded-xl text-primary-100 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all duration-200">
                        <option value="">Выберите оборудование</option>
                        {% for eq in equipment %}
                        <option value="{{ eq.id }}">{{ eq.name }} ({{ eq.type }}) - {{ eq.location }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div>
                <h3 class="text-lg font-semibold text-primary-100 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    Информация о сотруднике
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-primary-300 mb-2">ФИО сотрудника *</label>
                        <input type="text" name="assigned_to" required 
                               class="w-full px-4 py-3 bg-primary-800/30 border border-primary-700/50 rounded-xl text-primary-100 placeholder-primary-400 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all duration-200"
                               placeholder="Иванов Иван Иванович">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-primary-300 mb-2">Подразделение *</label>
                        <input type="text" name="department" required 
                               class="w-full px-4 py-3 bg-primary-800/30 border border-primary-700/50 rounded-xl text-primary-100 placeholder-primary-400 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all duration-200"
                               placeholder="Например: Отдел разработки">
                    </div>
                </div>
            </div>

            <!-- Assignment Details -->
            <div>
                <h3 class="text-lg font-semibold text-primary-100 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    Детали назначения
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-primary-300 mb-2">Дата назначения *</label>
                        <input type="date" name="assignment_date" required 
                               class="w-full px-4 py-3 bg-primary-800/30 border border-primary-700/50 rounded-xl text-primary-100 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all duration-200">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-primary-300 mb-2">Планируемая дата возврата</label>
                        <input type="date" name="return_date" 
                               class="w-full px-4 py-3 bg-primary-800/30 border border-primary-700/50 rounded-xl text-primary-100 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all duration-200">
                    </div>
                </div>
                
                <div class="mt-4">
                    <label class="block text-sm font-medium text-primary-300 mb-2">Цель использования *</label>
                    <textarea name="purpose" rows="3" required 
                              class="w-full px-4 py-3 bg-primary-800/30 border border-primary-700/50 rounded-xl text-primary-100 placeholder-primary-400 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all duration-200"
                              placeholder="Опишите цель использования оборудования..."></textarea>
                </div>
            </div>

            <div class="flex gap-4 pt-6 border-t border-primary-700/30">
                <button type="submit" 
                        class="px-8 py-3 bg-gradient-to-r from-primary-700 to-primary-600 hover:from-primary-600 hover:to-primary-500 text-primary-50 font-medium rounded-xl transition-all duration-200 transform hover:scale-[1.02]">
                    Создать назначение
                </button>
                <a href="{{ url_for('main.assignments') }}" 
                   class="px-8 py-3 bg-primary-800/50 hover:bg-primary-700/50 text-primary-200 border border-primary-700/50 rounded-xl transition-all duration-200">
                    Отмена
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
