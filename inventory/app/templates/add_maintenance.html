{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-semibold text-primary-100 mb-2">Запланировать обслуживание</h1>
        <p class="text-primary-400">Создание новой записи технического обслуживания</p>
    </div>

    <div class="glass-morph subtle-shadow rounded-2xl p-8 border border-primary-700/30">
        <form method="post" class="space-y-6">
            <div>
                <h3 class="text-lg font-semibold text-primary-100 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"/>
                    </svg>
                    Выбор оборудования
                </h3>
                <div>
                    <label class="block text-sm font-medium text-primary-300 mb-2">Оборудование *</label>
                    <select name="equipment_id" required 
                            class="w-full px-4 py-3 bg-primary-800/30 border border-primary-700/50 rounded-xl text-primary-100 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all duration-200">
                        <option value="">Выберите оборудование</option>
                        {% for eq in equipment %}
                        <option value="{{ eq.id }}">{{ eq.name }} ({{ eq.type }}) - {{ eq.location }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div>
                <h3 class="text-lg font-semibold text-primary-100 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    </svg>
                    Детали обслуживания
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-primary-300 mb-2">Тип обслуживания *</label>
                        <select name="type" required 
                                class="w-full px-4 py-3 bg-primary-800/30 border border-primary-700/50 rounded-xl text-primary-100 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all duration-200">
                            <option value="">Выберите тип</option>
                            <option value="Профилактика">Профилактика</option>
                            <option value="Ремонт">Ремонт</option>
                            <option value="Обновление">Обновление</option>
                            <option value="Диагностика">Диагностика</option>
                            <option value="Замена комплектующих">Замена комплектующих</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-primary-300 mb-2">Статус *</label>
                        <select name="status" required 
                                class="w-full px-4 py-3 bg-primary-800/30 border border-primary-700/50 rounded-xl text-primary-100 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all duration-200">
                            <option value="planned">Запланировано</option>
                            <option value="in_progress">В процессе</option>
                            <option value="on_hold">Приостановлено</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-primary-300 mb-2">Дата обслуживания *</label>
                        <input type="date" name="scheduled_date" required 
                               class="w-full px-4 py-3 bg-primary-800/30 border border-primary-700/50 rounded-xl text-primary-100 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all duration-200">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-primary-300 mb-2">Стоимость (руб)</label>
                        <input type="number" name="cost" step="0.01" 
                               class="w-full px-4 py-3 bg-primary-800/30 border border-primary-700/50 rounded-xl text-primary-100 placeholder-primary-400 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all duration-200"
                               placeholder="0.00">
                    </div>
                </div>
            </div>

            <div>
                <h3 class="text-lg font-semibold text-primary-100 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    Дополнительная информация
                </h3>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-primary-300 mb-2">Описание работ *</label>
                    <textarea name="description" rows="4" required 
                              class="w-full px-4 py-3 bg-primary-800/30 border border-primary-700/50 rounded-xl text-primary-100 placeholder-primary-400 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all duration-200"
                              placeholder="Подробное описание планируемых работ..."></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-primary-300 mb-2">Используемые запчасти</label>
                    <textarea name="parts_used" rows="3" 
                              class="w-full px-4 py-3 bg-primary-800/30 border border-primary-700/50 rounded-xl text-primary-100 placeholder-primary-400 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-all duration-200"
                              placeholder="Список используемых запчастей и материалов..."></textarea>
                </div>
            </div>

            <div class="flex gap-4 pt-6 border-t border-primary-700/30">
                <button type="submit" 
                        class="px-8 py-3 bg-gradient-to-r from-primary-700 to-primary-600 hover:from-primary-600 hover:to-primary-500 text-primary-50 font-medium rounded-xl transition-all duration-200 transform hover:scale-[1.02]">
                    Создать запись обслуживания
                </button>
                <a href="{{ url_for('main.maintenance') }}" 
                   class="px-8 py-3 bg-primary-800/50 hover:bg-primary-700/50 text-primary-200 border border-primary-700/50 rounded-xl transition-all duration-200">
                    Отмена
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
